<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integer Rollover Visualiser</title>
  <style>
    /* umber-light */
    @media (prefers-color-scheme: light) {
      :root {
        --accent:            #c4622d;
        --accent-hover:      #a84f22;
        --accent-dark:       #5a4030;
        --accent-dark-hover: #3a2010;
        --page-bg:           #f7f3ee;
        --surface-bg:        #fdfcfa;
        --text-active:       #3a2e24;
        --text-secondary:    #8a7060;
        --error:             #c0392b;
        --warning:           #c48a1a;
        --surface-border:    #ccc4b8;
        --surface-bottom:    #b8b0a4;
      }
    }
    /* umber-dark */
    @media (prefers-color-scheme: dark) {
      :root {
        --accent:            #c4622d;
        --accent-hover:      #a84f22;
        --accent-dark:       #e07840;
        --accent-dark-hover: #c46030;
        --page-bg:           #1e1810;
        --surface-bg:        #32281c;
        --text-active:       #e8d8c0;
        --text-secondary:    #a89070;
        --error:             #e05040;
        --warning:           #e0aa30;
        --surface-border:    #4a3c2c;
        --surface-bottom:    #5a4a36;
      }
    }
    /* ember reset + body */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--page-bg);
      color: var(--text-active);
      font-size: 0.875rem;
      line-height: 1.5;
      display: flex;
      min-height: 100vh;
    }
    /* ember section-label */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    /* ember btn */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-bg);
      border: 1px solid var(--surface-border);
      border-bottom: 3px solid var(--surface-bottom);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--accent-dark);
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
      line-height: 1.4;
      user-select: none;
    }
    .btn:hover { color: var(--accent); }
    .btn:active, .btn.pressed {
      border-bottom-width: 1px;
      transform: translateY(2px);
    }
    .btn-primary {
      background: var(--accent);
      border-color: var(--accent-dark);
      border-bottom-color: var(--accent-dark);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-dark-hover);
      border-bottom-color: var(--accent-dark-hover);
      color: #fff;
    }
    /* ember form-label */
    .form-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }
  </style>
  <style>
    body {
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: monospace;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .app-card {
      background: var(--surface-bg);
      border: 1px solid var(--surface-border);
      border-bottom: 3px solid var(--surface-bottom);
      border-radius: 6px;
      padding: 1.25rem;
      width: 100%;
      max-width: 560px;
      margin-bottom: 1rem;
    }

    /* Controls */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .row > .form-label {
      min-width: 5.5rem;
    }

    .btn-group {
      display: flex;
      gap: 0.375rem;
      flex-wrap: wrap;
    }

    .rate-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .rate-input {
      width: 6rem;
      background: var(--surface-bg);
      border: 1px solid var(--surface-border);
      border-radius: 5px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.8125rem;
      color: var(--text-active);
    }

    .rate-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Stats */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 0.9375rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text-active);
      word-break: break-all;
    }

    .stat-value.mono {
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
    }

    /* Result card — accent filled */
    .card-result {
      background: var(--accent);
      border-color: var(--accent-dark);
      border-bottom-color: var(--accent-dark);
      color: #fff;
      text-align: center;
    }

    .card-result .section-label {
      color: rgba(255,255,255,0.7);
    }

    /* Countdown */
    .countdown-value {
      font-size: 2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .countdown-value.warn   { color: var(--warning); }
    .countdown-value.danger { color: var(--error); }

    .countdown-sub {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.25rem;
    }

    .invalid-msg {
      color: var(--error);
      font-size: 0.875rem;
      padding: 1rem 0;
      font-weight: 500;
    }

    .card-result .invalid-msg { color: rgba(255,255,255,0.9); }
  </style>
</head>
<body>

<h1>Integer Rollover Visualiser</h1>

<div class="app-card">
  <div class="section-label" style="margin-bottom:1rem">Configuration</div>
  <div class="control-group">

    <div class="row">
      <span class="form-label">Bit width</span>
      <div class="btn-group" id="bits-group">
        <button class="btn" data-bits="8">8-bit</button>
        <button class="btn" data-bits="16">16-bit</button>
        <button class="btn" data-bits="32">32-bit</button>
        <button class="btn" data-bits="64">64-bit</button>
      </div>
    </div>

    <div class="row">
      <span class="form-label">Signedness</span>
      <div class="btn-group" id="sign-group">
        <button class="btn" data-sign="unsigned">Unsigned</button>
        <button class="btn" data-sign="signed">Signed</button>
      </div>
    </div>

    <div class="row">
      <span class="form-label">Update rate</span>
      <div class="rate-row">
        <input class="rate-input" type="number" id="rate-amount" value="1" min="1" step="1">
        <span style="font-size:0.8125rem;color:var(--text-secondary)">per</span>
        <div class="btn-group" id="unit-group">
          <button class="btn" data-unit="ms">ms</button>
          <button class="btn" data-unit="s">second</button>
          <button class="btn" data-unit="min">minute</button>
          <button class="btn" data-unit="hr">hour</button>
          <button class="btn" data-unit="day">day</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="app-card">
  <div class="section-label" style="margin-bottom:1rem">Range</div>
  <div class="stat-grid">
    <div class="stat">
      <div class="form-label">Minimum</div>
      <div class="stat-value mono" id="val-min">—</div>
    </div>
    <div class="stat">
      <div class="form-label">Maximum</div>
      <div class="stat-value mono" id="val-max">—</div>
    </div>
    <div class="stat">
      <div class="form-label">Total values</div>
      <div class="stat-value" id="val-count">—</div>
    </div>
    <div class="stat">
      <div class="form-label">Rollover rate</div>
      <div class="stat-value" id="val-rate">—</div>
    </div>
  </div>
</div>

<div class="app-card card-result">
  <div class="section-label">Time until rollover</div>
  <div id="result-area" style="margin-top:0.75rem">
    <div class="invalid-msg" id="invalid-msg" style="display:none">Enter a valid update rate (≥ 1).</div>
    <div id="valid-area">
      <div class="countdown-value" id="countdown-value">—</div>
      <div class="countdown-sub" id="countdown-sub"></div>
    </div>
  </div>
</div>

<script>
  const state = {
    bits: 16,
    signed: false,
    rateAmount: 1,
    rateUnit: 's',
  };

  const unitMs = { ms: 1, s: 1000, min: 60_000, hr: 3_600_000, day: 86_400_000 };

  function maxValue(bits, signed) {
    if (!signed) return (1n << BigInt(bits)) - 1n;
    return (1n << BigInt(bits - 1)) - 1n;
  }

  function minValue(bits, signed) {
    if (!signed) return 0n;
    return -(1n << BigInt(bits - 1));
  }

  function totalValues(bits) {
    return 1n << BigInt(bits);
  }

  const locale = navigator.language || 'en';

  function fmtBigInt(n) {
    const s = n < 0n ? '-' + (-n).toString() : n.toString();
    const neg = n < 0n;
    const digits = neg ? s.slice(1) : s;
    if (digits.length <= 15) return Number(n).toLocaleString(locale);
    const sep = (1234).toLocaleString(locale).replace(/\d/g, '');
    let result = '';
    let i = digits.length;
    while (i > 0) {
      const start = Math.max(0, i - 3);
      result = digits.slice(start, i) + (result ? sep + result : '');
      i = start;
    }
    return (neg ? '-' : '') + result;
  }

  function fmtDuration(ms) {
    if (ms < 1) return '< 1 ms';
    const units = [
      { label: 'year',        ms: 365.25 * 86_400_000 },
      { label: 'day',         ms: 86_400_000 },
      { label: 'hour',        ms: 3_600_000 },
      { label: 'minute',      ms: 60_000 },
      { label: 'second',      ms: 1_000 },
      { label: 'millisecond', ms: 1 },
    ];
    const parts = [];
    let remaining = ms;
    for (const u of units) {
      if (remaining >= u.ms) {
        const count = Math.floor(remaining / u.ms);
        remaining -= count * u.ms;
        parts.push(`${count.toLocaleString(locale)} ${u.label}${count !== 1 ? 's' : ''}`);
        if (parts.length === 3) break;
      }
    }
    return parts.join(', ') || '< 1 ms';
  }

  function setActive(groupId, attr, value) {
    document.querySelectorAll(`#${groupId} .btn`).forEach(b => {
      b.classList.toggle('btn-primary', b.dataset[attr] === String(value));
    });
  }

  function compute() {
    const { bits, signed, rateAmount, rateUnit } = state;

    const mn    = minValue(bits, signed);
    const mx    = maxValue(bits, signed);
    const total = totalValues(bits);

    document.getElementById('val-min').textContent   = fmtBigInt(mn);
    document.getElementById('val-max').textContent   = fmtBigInt(mx);
    document.getElementById('val-count').textContent = fmtBigInt(total);

    const invalidMsg  = document.getElementById('invalid-msg');
    const validArea   = document.getElementById('valid-area');
    const countdownEl = document.getElementById('countdown-value');
    const countdownSub= document.getElementById('countdown-sub');
    const valRate     = document.getElementById('val-rate');

    const amount = rateAmount;
    if (!Number.isFinite(amount) || amount <= 0) {
      invalidMsg.style.display = '';
      validArea.style.display  = 'none';
      valRate.textContent = '—';
      return;
    }
    invalidMsg.style.display = 'none';
    validArea.style.display  = '';

    const msPerIncrement = unitMs[rateUnit] / amount;
    const totalNum       = Number(total);
    const rolloverMs     = totalNum * msPerIncrement;

    const incPerSec = 1000 / msPerIncrement;
    if (incPerSec >= 1) {
      valRate.textContent = `${incPerSec.toLocaleString(locale, { maximumFractionDigits: 2 })} / second`;
    } else {
      const secPerInc = msPerIncrement / 1000;
      valRate.textContent = `1 per ${secPerInc.toLocaleString(locale, { maximumFractionDigits: 2 })} seconds`;
    }

    countdownEl.textContent = fmtDuration(rolloverMs);

    const totalSec = rolloverMs / 1000;
    countdownSub.textContent = `(${totalSec.toLocaleString(locale, { maximumFractionDigits: 3 })} seconds)`;

    countdownEl.className = 'countdown-value';
    if (rolloverMs < 60_000)      countdownEl.classList.add('danger');
    else if (rolloverMs < 3_600_000) countdownEl.classList.add('warn');
  }

  function wireGroup(groupId, stateKey, attrName, transform) {
    document.getElementById(groupId).addEventListener('click', e => {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      state[stateKey] = transform(btn.dataset[attrName]);
      setActive(groupId, attrName, btn.dataset[attrName]);
      compute();
    });
  }

  wireGroup('bits-group', 'bits',     'bits', v => parseInt(v));
  wireGroup('sign-group', 'signed',   'sign', v => v === 'signed');
  wireGroup('unit-group', 'rateUnit', 'unit', v => v);

  document.getElementById('rate-amount').addEventListener('input', e => {
    state.rateAmount = parseFloat(e.target.value);
    compute();
  });

  // Set initial active states
  setActive('bits-group', 'bits', '16');
  setActive('sign-group', 'sign', 'unsigned');
  setActive('unit-group', 'unit', 's');
  compute();
</script>
</body>
</html>
